  <div id="root"></div>

  { id: "u2", name: "Doreen Grant", role: "Supervisor", level: "supervisor", pin: "super123" },

const NAV = [
  ["dashboard", "Home"],
  ["raise", "Raise New Query"],
  ["all", "Find Query"],
  ["my", "My Raised Queries"],
  ["analytics", "Reports"],
  ["rules", "Rules"],

const QUERY_TYPES = [
  "Payment and transaction issue",
  "Application progress follow up",
  "Courier, return label or tracking issue",
  "Applicant document or portal access issue",
  "Mission escalation request",
  "Application status incorrect or stuck",
  "Urgent travel escalation",
  "Incomplete or cancelled application",
  "General enquiry or support request",
];
const APP_STATUSES = ["Pending", "Received", "Queried", "Verified", "Issued", "Batched", "Despatched", "Incomplete", "Cancelled"];
const QUERY_STATUSES = ["Open", "In Progress", "Resolved", "Unresolved", "Cancelled"];
const SERVICE_TYPES = ["Standard", "Expedited"];
const APP_TYPES = ["Single Application", "Group Application"];

const uid = p => `${p}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
const cn = (...x) => x.filter(Boolean).join(" ");
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
const isoDate = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
const localDate = s => { if (!/^\d{4}-\d{2}-\d{2}$/.test(s || "")) return null; const [y, m, d] = s.split("-").map(Number); const x = new Date(y, m - 1, d); return x.getFullYear() === y && x.getMonth() === m - 1 && x.getDate() === d ? x : null; };
const startDay = d => { const x = new Date(d); x.setHours(0, 0, 0, 0); return x; };
const fmtDate = v => { const d = typeof v === "string" && v.length === 10 ? localDate(v) : new Date(v); return d && !Number.isNaN(d.getTime()) ? new Intl.DateTimeFormat("en-GB", { day: "2-digit", month: "short", year: "numeric" }).format(d) : "Not provided"; };
const fmtTime = v => { const d = new Date(v); return Number.isNaN(d.getTime()) ? "Not provided" : new Intl.DateTimeFormat("en-GB", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" }).format(d); };

function daysUntil(date, ref = new Date()) {
  const target = localDate(date);
  return target ? Math.ceil((startDay(target) - startDay(ref)) / 86400000) : null;
}

function businessDays(start, end = new Date()) {
  let a = startDay(start), b = startDay(end), n = 0;
  if (Number.isNaN(a.getTime()) || Number.isNaN(b.getTime()) || a > b) return 0;
  while (a <= b) { const day = a.getDay(); if (day !== 0 && day !== 6) n++; a.setDate(a.getDate() + 1); }
  return n;
}

function urgency(q, ref = new Date()) {
  const d = daysUntil(q.travelDate, ref);
  if (q.applicationStatus === "Cancelled" || q.status === "Cancelled") return ["Closed", "slate", d];
  if (d === null) return ["No travel date", "slate", null];
  if (["Incomplete", "Queried"].includes(q.applicationStatus) && d <= 7) return ["Critical", "red", d];
  if (q.serviceType === "Expedited" && d <= 2) return ["Critical", "red", d];
  if (q.serviceType === "Expedited" && d <= 5) return ["High", "orange", d];
  if (d <= 3) return ["Critical", "red", d];
  if (d <= 7) return ["High", "orange", d];
  if (d <= 14) return ["Medium", "amber", d];
  return ["Low", "green", d];
}

function sla(q, ref = new Date()) {
  const elapsed = businessDays(new Date(q.createdAt), ref);
  let target = q.serviceType === "Expedited" ? 7 : 15;
  if (["Incomplete", "Queried"].includes(q.applicationStatus)) target = Math.max(3, target - 3);
  if (q.status === "Resolved") return ["Resolved", "green", elapsed, target];
  if (q.status === "Cancelled" || q.applicationStatus === "Cancelled") return ["Cancelled", "slate", elapsed, target];
  if (target - elapsed < 0) return ["Breached", "red", elapsed, target];
  if (target - elapsed <= 2) return ["At Risk", "amber", elapsed, target];
  return ["On Track", "green", elapsed, target];
}

function seed() {
  const now = new Date();
  const make = (id, app, type, appStatus, travelOffset, serviceType, ownerId, ownerName, status, createdOffset, details, firstName, lastName, dob, attachments = []) => {
    const createdAt = addDays(now, createdOffset).toISOString();
    return {
      id, parentId: null, applicationNumber: app, firstName, lastName, dateOfBirth: dob, queryType: type,
      applicationStatus: appStatus, travelDate: isoDate(addDays(now, travelOffset)), serviceType,
      applicationType: "Single Application", groupReferenceNumber: "", applicantEmail: `${firstName.toLowerCase()}.${lastName.toLowerCase()}@example.com`,
      applicantPhone: "+44 7700 900000", trackingNumber: "", queryDetails: details, attachments,
      ownerId, ownerName, assignedIds: [ownerId, "u3"], status, createdAt,
      comments: [{ id: `${id}-c1`, author: ownerName, authorId: ownerId, role: "Support Agent", timestamp: createdAt, body: "Initial query raised by support." }],
    };
  };
  return [
    make("q1", "GVWE2026050002147", "Payment and transaction issue", "Pending", 2, "Expedited", "u1", "Amma Mensah", "Open", -2, "Applicant paid but payment is still pending.", "Kwame", "Mensah", "1991-04-12", ["payment-receipt.png"]),
    make("q2", "GVDC2026040009182", "Applicant document or portal access issue", "Queried", 8, "Standard", "u2", "Doreen Grant", "In Progress", -5, "Applicant uploaded replacement document and needs portal access reopened.", "Abena", "Owusu", "1988-11-03"),
    make("q3", "GVDC2026040007710", "Courier, return label or tracking issue", "Despatched", 22, "Standard", "u1", "Amma Mensah", "Resolved", -9, "Applicant is asking for tracking details.", "Yaw", "Boateng", "1979-07-21"),
    make("q4", "GVWE2026040006102", "Incomplete or cancelled application", "Incomplete", 4, "Standard", "u2", "Doreen Grant", "Unresolved", -19, "Applicant provided return label late and application is incomplete.", "Akua", "Asante", "1994-02-18", ["return-label.pdf"]),
  ];
}

function tone(t) {
  return ({ red: "bg-rose-50 text-rose-700 ring-rose-200", orange: "bg-orange-50 text-orange-700 ring-orange-200", amber: "bg-amber-50 text-amber-700 ring-amber-200", green: "bg-emerald-50 text-emerald-700 ring-emerald-200", blue: "bg-blue-50 text-blue-700 ring-blue-200", purple: "bg-violet-50 text-violet-700 ring-violet-200", slate: "bg-slate-50 text-slate-700 ring-slate-200" }[t] || "bg-slate-50 text-slate-700 ring-slate-200");
}

function statusTone(status) {
  return ({ Resolved: "green", Unresolved: "red", Cancelled: "slate", Open: "blue", "In Progress": "amber" }[status] || "blue");
}

function audit(author, body) {
  return { id: uid("c"), author: author.name, authorId: author.id, role: author.role, timestamp: new Date().toISOString(), body };
}

function Badge({ children, t = "slate" }) {
  return <span className={cn("inline-flex rounded-full px-2.5 py-1 text-xs font-semibold ring-1", tone(t))}>{children}</span>;
}
function Card({ children, className = "" }) {
  return <div className={cn("rounded-[1.5rem] bg-white p-6 shadow-[0_12px_35px_rgba(15,23,42,0.06)] ring-1 ring-slate-200/90", className)}>{children}</div>;
}
function Header({ title, desc }) {
  return <div><div className="inline-flex items-center gap-2 rounded-full bg-blue-50 px-3 py-1.5 text-sm font-medium text-blue-700 ring-1 ring-blue-100"><span className="h-2 w-2 rounded-full bg-blue-600" /> Internal query management</div><h1 className="mt-4 text-4xl font-medium tracking-tight text-slate-950">{title}</h1><p className="mt-2 max-w-3xl text-base leading-7 text-slate-500">{desc}</p></div>;
}
function Mini({ label, value }) {
  return <div><p className="text-[11px] font-bold uppercase tracking-wide text-slate-400">{label}</p><p className="mt-1 break-words text-sm font-medium text-slate-700">{value || "Not provided"}</p></div>;
}
function lastActivity(q) {
  const latest = q.comments?.length ? q.comments[q.comments.length - 1] : null;
  return { when: latest?.timestamp || q.createdAt, who: latest?.author || q.ownerName };
}
function userCanSee(q, user) {
  const p = PERMISSIONS[user.level];
  return p.scope === "all" || q.ownerId === user.id || (q.assignedIds || []).includes(user.id);
}

function LoginPage({ onLogin }) {
  const [userId, setUserId] = useState(USERS[0].id);
  const [pin, setPin] = useState("agent123");
  const [error, setError] = useState("");
  const selected = USERS.find(u => u.id === userId) || USERS[0];
  const submit = e => {
    e.preventDefault();
    if (pin !== selected.pin) return setError("Invalid PIN for the selected user level.");
    setError("");
    onLogin(selected);
  };
  return <div className="min-h-screen bg-gradient-to-br from-blue-50 via-slate-50 to-white p-6 text-slate-900"><div className="mx-auto grid min-h-[calc(100vh-3rem)] max-w-6xl items-center gap-8 lg:grid-cols-[1fr_420px]"><div><div className="inline-grid h-16 w-16 place-items-center rounded-3xl bg-blue-600 text-2xl font-black text-white shadow-xl shadow-blue-600/20">QD</div><h1 className="mt-8 text-5xl font-black tracking-tight">QueryDesk</h1><p className="mt-4 max-w-2xl text-lg leading-8 text-slate-600">A working ticketing and query management system with role-based login, parent/child queries, SLA tracking, urgency rules, comments, CSV export and access controls.</p><div className="mt-8 grid gap-3 md:grid-cols-3">{USERS.map(u => <Card key={u.id} className="shadow-none"><p className="font-bold">{u.role}</p><p className="mt-1 text-sm text-slate-500">Demo PIN: <span className="font-mono font-bold text-slate-800">{u.pin}</span></p></Card>)}</div></div><Card><form onSubmit={submit} className="space-y-5"><div><h2 className="text-2xl font-bold">Sign in</h2><p className="mt-1 text-sm text-slate-500">Choose a user level to see its permissions.</p></div><label className="block"><span className="mb-1 block text-sm font-semibold">User level</span><select value={userId} onChange={e => { setUserId(e.target.value); const next = USERS.find(u => u.id === e.target.value); setPin(next?.pin || ""); }} className="input">{USERS.map(u => <option key={u.id} value={u.id}>{u.name} — {u.role}</option>)}</select></label><label className="block"><span className="mb-1 block text-sm font-semibold">PIN</span><input value={pin} onChange={e => setPin(e.target.value)} className="input" type="password" /></label>{error && <p className="rounded-xl bg-rose-50 p-3 text-sm font-semibold text-rose-700 ring-1 ring-rose-200">{error}</p>}<button className="w-full rounded-2xl bg-blue-600 px-5 py-3.5 text-sm font-bold text-white shadow-lg shadow-blue-600/20 hover:bg-blue-700">Login as {selected.role}</button><div className="rounded-2xl bg-slate-50 p-4 text-sm text-slate-600 ring-1 ring-slate-200"><p className="font-bold text-slate-900">Permissions</p><p className="mt-1">{PERMISSIONS[selected.level].scope === "all" ? "Can view all queries." : "Can view owned or assigned queries only."}</p><p>{PERMISSIONS[selected.level].canChangeStatus ? "Can change ticket and application statuses." : "Cannot change ticket or application statuses."}</p></div></form></Card></div><style>{baseCss}</style></div>;
}

function QueryCard({ q, open, refDate, compact = false }) {
  const [u, ut] = urgency(q, refDate);
  const [s, st] = sla(q, refDate);
  const activity = lastActivity(q);
  return <button onClick={() => open(q)} className={cn("group w-full overflow-hidden rounded-[1.3rem] bg-white text-left shadow-sm ring-1 ring-slate-200 transition hover:-translate-y-0.5 hover:shadow-lg", compact ? "p-4" : "p-5")}>
    <div className={cn("grid gap-4", compact ? "lg:grid-cols-[1fr_220px]" : "lg:grid-cols-[1fr_300px]")}> 
      <div className="min-w-0">
        <div className="flex flex-wrap items-center gap-2">
          <h3 className="break-all font-bold text-slate-950">{q.applicationNumber || "No reference"}</h3>
          <Badge t={ut}>{u}</Badge>
          <Badge t={st}>{s}</Badge>
          <Badge t={statusTone(q.status)}>{q.status}</Badge>
          {q.parentId && <Badge t="purple">Child</Badge>}
        </div>
        <p className="mt-2 text-sm font-bold text-slate-900">{q.queryType}</p>
        <p className="mt-1 line-clamp-2 text-sm leading-6 text-slate-500">{q.queryDetails}</p>
      </div>
      <div className="min-w-0 rounded-2xl bg-slate-50 p-4 ring-1 ring-slate-200">
        <div className="grid grid-cols-2 gap-3">
          <Mini label="Applicant" value={`${q.firstName} ${q.lastName}`} />
          <Mini label="Travel" value={fmtDate(q.travelDate)} />
          <Mini label="Owner" value={q.ownerName} />
          <Mini label="Updated" value={`${fmtDate(activity.when)} by ${activity.who}`} />
        </div>
      </div>
    </div>
  </button>;
}

function Stat({ title, value, note, t = "blue" }) {
  return <Card><div className="flex items-center gap-4"><div className={cn("grid h-12 w-12 shrink-0 place-items-center rounded-2xl text-xl font-black ring-1", tone(t))}>{String(title).slice(0, 1)}</div><div><p className="text-sm font-semibold text-slate-500">{title}</p><p className="mt-1 text-3xl font-bold tracking-tight text-slate-950">{value}</p><p className={cn("mt-2 inline-flex rounded-full px-2.5 py-1 text-xs font-semibold ring-1", tone(t))}>{note}</p></div></div></Card>;
}
function Field({ label, value, set, type = "text", required = false }) {
  return <label className="block"><span className="mb-1 block text-sm font-semibold">{label}{required && <span className="text-rose-600"> *</span>}</span><input type={type} value={value} onChange={e => set(e.target.value)} className="input" /></label>;
}
function Sel({ label, value, set, opts, required = false, disabled = false }) {
  return <label className="block"><span className="mb-1 block text-sm font-semibold">{label}{required && <span className="text-rose-600"> *</span>}</span><select value={value} onChange={e => set(e.target.value)} disabled={disabled} className="input disabled:bg-slate-100 disabled:text-slate-500">{opts.map(o => <option key={o}>{o}</option>)}</select></label>;
}

function DashboardIcon({ type, colour = "blue" }) {
  const stroke = ({ blue: "#2563eb", amber: "#f97316", green: "#10b981", red: "#e11d48", slate: "#64748b" }[colour] || "#2563eb");
  const common = { fill: "none", stroke, strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round" };
  if (type === "urgent") return <svg viewBox="0 0 24 24" className="h-6 w-6" aria-hidden="true"><circle cx="12" cy="12" r="9" {...common}/><path d="M12 7v6" {...common}/><path d="M12 17h.01" {...common}/></svg>;
  if (type === "shield") return <svg viewBox="0 0 24 24" className="h-6 w-6" aria-hidden="true"><path d="M12 3l7 3v5c0 5-3.2 8.4-7 10-3.8-1.6-7-5-7-10V6l7-3z" {...common}/></svg>;
  if (type === "lock") return <svg viewBox="0 0 24 24" className="h-6 w-6" aria-hidden="true"><rect x="5" y="10" width="14" height="10" rx="2" {...common}/><path d="M8 10V8a4 4 0 018 0v2" {...common}/><path d="M12 14v2" {...common}/></svg>;
  if (type === "check") return <svg viewBox="0 0 24 24" className="h-6 w-6" aria-hidden="true"><circle cx="12" cy="12" r="9" {...common}/><path d="M8 12.5l2.5 2.5L16 9" {...common}/></svg>;
  return <svg viewBox="0 0 24 24" className="h-6 w-6" aria-hidden="true"><rect x="7" y="4" width="10" height="16" rx="2" {...common}/><path d="M9 8h6M9 12h6M9 16h4" {...common}/><path d="M10 3h4" {...common}/></svg>;
}

function DashboardMetric({ title, value, note, t = "blue", icon = "clipboard", active, onClick }) {
  const cfg = ({
    blue: { border: "border-blue-100", accent: "bg-blue-500", iconBg: "bg-blue-50", pill: "bg-blue-50 text-blue-700 ring-blue-100", hover: "hover:border-blue-200" },
    amber: { border: "border-orange-100", accent: "bg-orange-500", iconBg: "bg-orange-50", pill: "bg-orange-50 text-orange-700 ring-orange-100", hover: "hover:border-orange-200" },
    green: { border: "border-emerald-100", accent: "bg-emerald-500", iconBg: "bg-emerald-50", pill: "bg-emerald-50 text-emerald-700 ring-emerald-100", hover: "hover:border-emerald-200" },
    red: { border: "border-rose-100", accent: "bg-rose-500", iconBg: "bg-rose-50", pill: "bg-rose-50 text-rose-700 ring-rose-100", hover: "hover:border-rose-200" },
    slate: { border: "border-slate-200", accent: "bg-slate-400", iconBg: "bg-slate-50", pill: "bg-slate-50 text-slate-700 ring-slate-200", hover: "hover:border-slate-300" },
  }[t] || { border: "border-slate-200", accent: "bg-slate-400", iconBg: "bg-slate-50", pill: "bg-slate-50 text-slate-700 ring-slate-200", hover: "hover:border-slate-300" });

  return <button onClick={onClick} className={cn(
    "group relative w-full overflow-hidden rounded-[1.35rem] border bg-white px-5 py-6 text-left shadow-[0_10px_26px_rgba(15,23,42,0.05)] transition hover:-translate-y-0.5 hover:shadow-[0_18px_36px_rgba(15,23,42,0.08)] focus:outline-none focus:ring-4 focus:ring-blue-100",
    cfg.border,
    cfg.hover,
    active && "ring-2 ring-blue-100"
  )}>
    <div className={cn("absolute inset-x-0 top-0 h-1", cfg.accent)} />
    <div className="flex min-h-[142px] flex-col justify-between gap-6">
      <div>
        <span className={cn("inline-flex items-center gap-2 rounded-full px-3 py-1.5 text-sm font-medium ring-1", cfg.pill)}>
          <span className={cn("h-2 w-2 rounded-full", cfg.accent)} />
          {note}
        </span>
      </div>

      <div className="flex items-center gap-4">
        <div className={cn("grid h-14 w-14 shrink-0 place-items-center rounded-2xl", cfg.iconBg)}>
          <DashboardIcon type={icon} colour={t} />
        </div>
        <div className="min-w-0 flex-1">
          <p className="text-base font-medium leading-tight text-slate-900">{title}</p>
          <p className="mt-2 text-4xl font-normal leading-none tracking-tight text-slate-950">{value}</p>
        </div>
        <span className="text-3xl font-light leading-none text-slate-400 transition group-hover:translate-x-0.5 group-hover:text-slate-600">›</span>
      </div>
    </div>
  </button>;
}

function DashboardCaseCard({ q, open, refDate, sectionTone = "slate" }) {
  const [u, ut, days] = urgency(q, refDate);
  const [s, st, elapsed, target] = sla(q, refDate);
  const activity = lastActivity(q);
  const accent = ({
    red: "border-l-rose-500 hover:border-rose-300",
    amber: "border-l-amber-500 hover:border-amber-300",
    blue: "border-l-blue-500 hover:border-blue-300",
    green: "border-l-emerald-500 hover:border-emerald-300",
    slate: "border-l-slate-400 hover:border-slate-300",
  }[sectionTone] || "border-l-slate-400 hover:border-slate-300");

  const facts = [
    ["Applicant", `${q.firstName} ${q.lastName}`],
    ["DOB", fmtDate(q.dateOfBirth)],
    ["Email", q.applicantEmail],
    ["Phone", q.applicantPhone],
    ["Application status", q.applicationStatus],
    ["Service", q.serviceType],
    ["Travel", days === null ? "Not provided" : `${fmtDate(q.travelDate)} (${days} days)`],
    ["SLA", `${s} · ${elapsed}/${target} business days`],
    ["Owner", q.ownerName],
    ["Last updated", `${fmtDate(activity.when)} by ${activity.who}`],
    ["Application type", q.applicationType],
    ["Group reference", q.groupReferenceNumber || "Not applicable"],
  ];

  return <button onClick={() => open(q)} className={cn("w-full rounded-2xl border border-l-4 border-slate-200 bg-white p-5 text-left shadow-sm transition hover:-translate-y-0.5 hover:shadow-md", accent)}>
    <div className="flex flex-col gap-4 xl:flex-row xl:items-start xl:justify-between">
      <div className="min-w-0 flex-1">
        <div className="flex flex-wrap items-center gap-2">
          <h3 className="break-all text-base font-black text-slate-950">{q.applicationNumber || "No reference"}</h3>
          <Badge t={ut}>{u}</Badge>
          <Badge t={st}>{s}</Badge>
          <Badge t={statusTone(q.status)}>{q.status}</Badge>
          {q.parentId && <Badge t="purple">Child query</Badge>}
        </div>
        <p className="mt-2 text-sm font-bold text-slate-800">{q.queryType}</p>
        <p className="mt-2 text-sm leading-6 text-slate-600">{q.queryDetails}</p>
      </div>
      <div className="shrink-0 rounded-xl bg-slate-50 px-3 py-2 text-xs font-bold text-slate-500 ring-1 ring-slate-200">
        Open full case
      </div>
    </div>

    <div className="mt-5 grid gap-x-6 gap-y-3 border-t border-slate-100 pt-4 md:grid-cols-2 xl:grid-cols-4">
      {facts.map(([label, value]) => <div key={label} className="min-w-0">
        <p className="text-[10px] font-black uppercase tracking-wide text-slate-400">{label}</p>
        <p className="mt-1 truncate text-sm font-semibold text-slate-700" title={value}>{value || "Not provided"}</p>

function getDashboardQueues(data, refDate) {
  const active = data.filter(q => !["Resolved", "Cancelled"].includes(q.status));
  const prioritySort = (a, b) => {
    const rank = { Critical: 0, High: 1, Medium: 2, Low: 3, "No travel date": 4, Closed: 5 };
    const au = urgency(a, refDate);
    const bu = urgency(b, refDate);
    return (rank[au[0]] ?? 9) - (rank[bu[0]] ?? 9) || (au[2] ?? 999) - (bu[2] ?? 999) || new Date(lastActivity(b).when) - new Date(lastActivity(a).when);
  };

  const immediateRows = active
    .filter(q => ["Critical", "High"].includes(urgency(q, refDate)[0]) || ["Breached"].includes(sla(q, refDate)[0]) || q.status === "Unresolved")
    .sort(prioritySort);

  const slaRows = active
    .filter(q => ["Breached", "At Risk"].includes(sla(q, refDate)[0]))
    .sort(prioritySort);

  const recentRows = [...active]
    .sort((a, b) => new Date(lastActivity(b).when) - new Date(lastActivity(a).when))
    .slice(0, 8);

  const openRows = active.filter(q => q.status === "Open").sort(prioritySort);
  const urgentRows = active.filter(q => ["Critical", "High"].includes(urgency(q, refDate)[0])).sort(prioritySort);
  const unresolvedRows = active.filter(q => q.status === "Unresolved").sort(prioritySort);
  const resolvedRows = data.filter(q => q.status === "Resolved").sort((a, b) => new Date(lastActivity(b).when) - new Date(lastActivity(a).when));

  const priorityRows = [...active].sort(prioritySort).slice(0, 5);

  return { active, immediateRows, slaRows, recentRows, openRows, urgentRows, unresolvedRows, resolvedRows, priorityRows };
}

function Raise({ data, user, create, open, notify }) {
  const [f, setF] = useState({ applicationNumber: "", firstName: "", lastName: "", dateOfBirth: "", applicantEmail: "", applicantPhone: "", queryType: QUERY_TYPES[0], applicationStatus: APP_STATUSES[0], travelDate: "", serviceType: SERVICE_TYPES[0], applicationType: APP_TYPES[0], groupReferenceNumber: "", trackingNumber: "", queryDetails: "", attachmentsText: "" });
  const set = (k, v) => setF(x => ({ ...x, [k]: v }));
  const normalise = v => String(v || "").trim().toLowerCase();

  const matches = data
    .map(q => {
      let score = 0;
      if (f.applicationNumber && normalise(q.applicationNumber) === normalise(f.applicationNumber)) score += 5;
      if (f.applicantEmail && normalise(q.applicantEmail) === normalise(f.applicantEmail)) score += 4;
      if (f.dateOfBirth && q.dateOfBirth === f.dateOfBirth) score += 2;
      if (f.firstName && normalise(q.firstName).includes(normalise(f.firstName))) score += 1;
      if (f.lastName && normalise(q.lastName).includes(normalise(f.lastName))) score += 1;
      if (f.applicationType === "Group Application" && f.groupReferenceNumber && normalise(q.groupReferenceNumber) === normalise(f.groupReferenceNumber)) score += 4;
      return { q, score };
    })
    .filter(x => x.score >= 4)
    .sort((a, b) => b.score - a.score)
    .map(x => x.q);

  const missing = !f.firstName || !f.lastName || !f.dateOfBirth || !f.applicantEmail || !f.queryType || !f.queryDetails || (f.applicationType === "Group Application" && !f.groupReferenceNumber);
  const submit = () => {
    if (missing) return notify("Please complete all mandatory fields before creating the query.");
    create({ ...f, id: uid("q"), parentId: null, attachments: f.attachmentsText.split(",").map(x => x.trim()).filter(Boolean), ownerId: user.id, ownerName: user.name, assignedIds: [user.id, "u3"], status: "Open", createdAt: new Date().toISOString(), comments: [audit(user, `Initial query raised: ${f.queryDetails}`)] });
  };
  return <div className="space-y-7"><Header title="Raise New Query" desc="Search first. If a parent query already exists, open it and add a comment or child query instead." />{matches.length > 0 && <Card className="bg-amber-50 ring-amber-200"><p className="font-bold text-amber-950">Possible existing query found</p><p className="mt-1 text-sm text-amber-800">Do not create a duplicate unless this is genuinely a separate issue. Open the existing case and add a comment or child query first.</p><div className="mt-3 space-y-3">{matches.slice(0, 3).map(q => <button key={q.id} onClick={() => open(q)} className="block w-full rounded-xl bg-white p-3 text-left text-sm ring-1 ring-amber-200"><b>{q.applicationNumber}</b> — {q.firstName} {q.lastName} — {q.status}</button>)}</div></Card>}<Card><div className="grid gap-4 md:grid-cols-2"><Field label="Application Number" value={f.applicationNumber} set={v => set("applicationNumber", v)} /><Field label="Applicant First Name" value={f.firstName} set={v => set("firstName", v)} required /><Field label="Applicant Surname" value={f.lastName} set={v => set("lastName", v)} required /><Field label="Date of Birth" type="date" value={f.dateOfBirth} set={v => set("dateOfBirth", v)} required /><Field label="Applicant Email" type="email" value={f.applicantEmail} set={v => set("applicantEmail", v)} required /><Field label="Applicant Phone" value={f.applicantPhone} set={v => set("applicantPhone", v)} /><Sel label="Query Type" value={f.queryType} set={v => set("queryType", v)} opts={QUERY_TYPES} required /><Sel label="Application Status" value={f.applicationStatus} set={v => set("applicationStatus", v)} opts={APP_STATUSES} /><Field label="Travel Date" type="date" value={f.travelDate} set={v => set("travelDate", v)} /><Sel label="Service Type" value={f.serviceType} set={v => set("serviceType", v)} opts={SERVICE_TYPES} /><Sel label="Application Type" value={f.applicationType} set={v => set("applicationType", v)} opts={APP_TYPES} required />{f.applicationType === "Group Application" && <Field label="Group Application Reference Number" value={f.groupReferenceNumber} set={v => set("groupReferenceNumber", v)} required />}<Field label="Tracking Number" value={f.trackingNumber} set={v => set("trackingNumber", v)} /><Field label="Attachments / Evidence" value={f.attachmentsText} set={v => set("attachmentsText", v)} /></div><label className="mt-4 block"><span className="mb-1 block text-sm font-semibold">Query Details <span className="text-rose-600">*</span></span><textarea value={f.queryDetails} onChange={e => set("queryDetails", e.target.value)} rows={5} className="input" /></label><div className="mt-6 flex justify-end"><button disabled={missing} onClick={submit} className="rounded-xl bg-slate-950 px-5 py-3 text-sm font-semibold text-white disabled:bg-slate-300">Create parent query</button></div></Card></div>;
}

function DetailPage({ q, user, back, update, refDate, create, open, notify, parentQuery, childrenQueries }) {
  const perms = PERMISSIONS[user.level];
  const [comment, setComment] = useState("");
  const [childText, setChildText] = useState("");
  const [u, ut, days] = urgency(q, refDate);
  const [s, st, elapsed, target] = sla(q, refDate);

  const appendAudit = (x, body) => ({ ...x, comments: [...(x.comments || []), audit(user, body)] });

  const addComment = () => {
    if (!comment.trim()) return;

    update(q.id, x => {
      const next = { ...x, comments: [...(x.comments || []), audit(user, comment.trim())] };
      if (x.status === "Resolved" && perms.canChangeStatus) {
        return appendAudit({ ...next, status: "Open" }, "System note: resolved query reopened because an authorised user added a new follow-up comment.");
      }
      return next;
    });

    setComment("");
    if (q.status === "Resolved" && perms.canChangeStatus) notify("Resolved query reopened because a new comment was added.");
    if (q.status === "Resolved" && !perms.canChangeStatus) notify("Comment added. This query remains resolved because your role cannot reopen protected statuses.");
  };

  const changeQueryStatus = v => {
    if (!perms.canChangeStatus || v === q.status) return;
    update(q.id, x => appendAudit({ ...x, status: v }, `Query status changed from ${x.status} to ${v}.`));
  };

  const changeApplicationStatus = v => {
    if (!perms.canChangeApplicationStatus || v === q.applicationStatus) return;
    update(q.id, x => appendAudit({ ...x, applicationStatus: v }, `Application status changed from ${x.applicationStatus} to ${v}.`));
  };

  const createChild = () => {
    if (!childText.trim()) return;
    const child = { ...q, id: uid("q"), parentId: q.parentId || q.id, queryDetails: childText.trim(), queryType: "General enquiry or support request", ownerId: user.id, ownerName: user.name, assignedIds: Array.from(new Set([...(q.assignedIds || []), user.id, "u3"])), status: "Open", createdAt: new Date().toISOString(), comments: [audit(user, `Child query raised: ${childText.trim()}`)] };
    create(child);
    setChildText("");
    notify("Child query created and linked to the parent application.");
  };

  return <div className="space-y-7"><button onClick={back} className="rounded-xl bg-white px-4 py-2 text-sm font-bold text-slate-700 ring-1 ring-slate-200">← Back</button><Header title={q.applicationNumber || "Query detail"} desc={`${q.firstName} ${q.lastName} · ${q.queryType}`} /><div className="grid gap-4 md:grid-cols-4"><Stat title="Urgency" value={u} note={days === null ? "No travel date" : `${days} days`} t={ut} /><Stat title="SLA" value={s} note={`${elapsed}/${target} business days`} t={st} /><Stat title="Status" value={q.status} note="Ticket" t={statusTone(q.status)} /><Stat title="Owner" value={q.ownerName.split(" ")[0]} note={q.ownerName} /></div><div className="grid gap-6 xl:grid-cols-[1fr_360px]"><Card><h2 className="text-xl font-bold">Case information</h2><div className="mt-5 grid gap-4 md:grid-cols-2"><Mini label="Applicant" value={`${q.firstName} ${q.lastName}`} /><Mini label="Date of birth" value={fmtDate(q.dateOfBirth)} /><Mini label="Email" value={q.applicantEmail} /><Mini label="Phone" value={q.applicantPhone} /><Mini label="Travel date" value={fmtDate(q.travelDate)} /><Mini label="Service type" value={q.serviceType} /><Mini label="Application type" value={q.applicationType} />{q.applicationType === "Group Application" && <Mini label="Group reference" value={q.groupReferenceNumber} />}<Mini label="Application status" value={q.applicationStatus} /></div><p className="mt-5 rounded-2xl bg-slate-50 p-4 text-sm leading-6 text-slate-600 ring-1 ring-slate-200">{q.queryDetails}</p>{q.attachments?.length > 0 && <div className="mt-4 flex flex-wrap gap-2">{q.attachments.map(a => <Badge key={a}>{a}</Badge>)}</div>}<div className="mt-6 grid gap-4 md:grid-cols-2"><Sel label="Query Status" value={q.status} set={changeQueryStatus} opts={QUERY_STATUSES} disabled={!perms.canChangeStatus} /><Sel label="Application Status" value={q.applicationStatus} set={changeApplicationStatus} opts={APP_STATUSES} disabled={!perms.canChangeApplicationStatus} /></div>{!perms.canChangeStatus && <p className="mt-2 text-xs font-semibold text-slate-500">Only Supervisors and Coordinators can change ticket or application status.</p>}</Card><Card><h2 className="text-xl font-bold">Linked queries</h2>{parentQuery && <button onClick={() => open(parentQuery)} className="mt-3 w-full rounded-xl bg-violet-50 p-3 text-left text-sm font-bold text-violet-700 ring-1 ring-violet-200">Open parent: {parentQuery.applicationNumber}</button>}<div className="mt-3 space-y-2">{childrenQueries.length ? childrenQueries.map(c => <button key={c.id} onClick={() => open(c)} className="w-full rounded-xl bg-slate-50 p-3 text-left text-sm ring-1 ring-slate-200">Child: {c.queryDetails.slice(0, 70)}</button>) : <p className="text-sm text-slate-500">No child queries yet.</p>}</div><label className="mt-5 block"><span className="mb-1 block text-sm font-semibold">Create child query</span><textarea value={childText} onChange={e => setChildText(e.target.value)} rows={4} disabled={!perms.canCreateChild} className="input disabled:bg-slate-100" /></label><button onClick={createChild} disabled={!perms.canCreateChild || !childText.trim()} className="mt-3 w-full rounded-xl bg-blue-600 px-4 py-2.5 text-sm font-bold text-white disabled:bg-slate-300">Create child query</button></Card></div><Card><h2 className="text-xl font-bold">Comments and audit trail</h2><div className="mt-4 space-y-3">{(q.comments || []).map(c => <div key={c.id} className={cn("rounded-2xl p-4 ring-1", c.role === "Coordinator" ? "bg-blue-50 ring-blue-200" : c.role === "Supervisor" ? "bg-violet-50 ring-violet-200" : "bg-slate-50 ring-slate-200")}><div className="flex flex-wrap items-center gap-2"><p className="font-bold">{c.author}</p><Badge t={c.role === "Coordinator" ? "blue" : c.role === "Supervisor" ? "purple" : "slate"}>{c.role}</Badge><span className="text-xs text-slate-500">{fmtTime(c.timestamp)}</span></div><p className="mt-2 text-sm leading-6 text-slate-600">{c.body}</p></div>)}</div><label className="mt-5 block"><span className="mb-1 block text-sm font-semibold">Add comment</span><textarea value={comment} onChange={e => setComment(e.target.value)} rows={4} disabled={!perms.canComment} className="input disabled:bg-slate-100" /></label><button onClick={addComment} disabled={!perms.canComment || !comment.trim()} className="mt-3 rounded-xl bg-slate-950 px-5 py-3 text-sm font-bold text-white disabled:bg-slate-300">Add comment</button></Card></div>;
}

}

function Rules() {
  return <div className="space-y-6"><Header title="Rules and Permissions" desc="Business rules and role controls used by the system." /><Card><div className="grid gap-6 md:grid-cols-2"><div><h2 className="font-bold">Urgency</h2><p className="mt-2 text-sm leading-6 text-slate-600">Urgency is based on travel date, application status and service type. Expedited, queried and incomplete applications become urgent sooner.</p></div><div><h2 className="font-bold">SLA</h2><p className="mt-2 text-sm leading-6 text-slate-600">Standard = 15 business days. Expedited = 7 business days. Queried or incomplete applications reduce the SLA target by 3 days, with a minimum of 3 days.</p></div></div></Card><Card><h2 className="text-xl font-bold">Access levels</h2><div className="mt-4 grid gap-4 md:grid-cols-3">{Object.entries(PERMISSIONS).map(([level, p]) => <div key={level} className="rounded-2xl bg-slate-50 p-4 ring-1 ring-slate-200"><p className="font-bold">{p.label}</p><p className="mt-2 text-sm text-slate-600">Scope: {p.scope === "all" ? "all queries" : "owned and assigned queries"}</p><p className="text-sm text-slate-600">Status changes: {p.canChangeStatus ? "Yes" : "No"}</p><p className="text-sm text-slate-600">Reports: {p.canViewReports ? "Yes" : "No"}</p></div>)}</div></Card></div>;
}

const baseCss = `.input{width:100%;border-radius:1rem;border:1px solid rgb(203 213 225);background:white;padding:.9rem 1rem;font-size:.875rem;outline:none;box-shadow:0 1px 2px rgba(15,23,42,.03)}.input:focus{border-color:rgb(37 99 235);box-shadow:0 0 0 4px rgba(37,99,235,.12)}button{transition:all .16s ease}`;

function TicketingQueryManagementSystem() {
  const [data, setData] = useState(() => {
    try {
      const saved = localStorage.getItem("querydesk_demo_data");
      return saved ? JSON.parse(saved) : seed();
    } catch {
      return seed();
    }
  });
  useEffect(() => {
    try { localStorage.setItem("querydesk_demo_data", JSON.stringify(data)); } catch {}
  }, [data]);
  const [sessionUser, setSessionUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [selected, setSelected] = useState(null);
  const [notice, setNotice] = useState("");
  const refDate = new Date();
  if (!sessionUser) return <LoginPage onLogin={u => { setSessionUser(u); setPage("dashboard"); }} />;
  const perms = PERMISSIONS[sessionUser.level];
  const visibleNav = NAV.filter(([key]) => perms.nav.includes(key));
  const visibleData = data.filter(q => userCanSee(q, sessionUser));
  const current = data.find(q => q.id === selected && userCanSee(q, sessionUser));
  const open = q => setSelected(q.id);
  const update = (id, fn) => setData(xs => xs.map(x => x.id === id ? fn(x) : x));
  const create = q => { setData(xs => [q, ...xs]); setSelected(q.id); };
  const goto = key => { if (!perms.nav.includes(key)) { setNotice("You do not have permission to access that page."); return; } setPage(key); setSelected(null); };
  const content = current
    ? <DetailPage q={current} user={sessionUser} back={() => setSelected(null)} update={update} refDate={refDate} create={create} open={open} notify={setNotice} parentQuery={current.parentId ? data.find(q => q.id === current.parentId) : null} childrenQueries={data.filter(q => q.parentId === current.id && userCanSee(q, sessionUser))} />
    : page === "dashboard" ? <Dashboard data={visibleData} open={open} refDate={refDate} openQueue={setPage} />
    : page.startsWith("queue-") ? <QueueLandingPage type={page} data={visibleData} open={open} refDate={refDate} back={() => setPage("dashboard")} />
    : page === "all" ? <ListPage title="Find Query" desc="Search by application number, name, surname, date of birth, email, status or query details." data={visibleData} open={open} refDate={refDate} />
    : page === "my" ? <ListPage title="My Raised Queries" desc="Queries raised by you." data={visibleData.filter(q => q.ownerId === sessionUser.id)} open={open} refDate={refDate} />
    : page === "raise" ? <Raise data={visibleData} user={sessionUser} create={create} open={open} notify={setNotice} />
    : page === "analytics" && perms.canViewReports ? <Analytics data={visibleData} open={open} refDate={refDate} user={sessionUser} />
    : page === "rules" && perms.canViewRules ? <Rules />
    : <Dashboard data={visibleData} open={open} refDate={refDate} openQueue={setPage} />;
  return <div className="min-h-screen bg-gradient-to-br from-slate-50 via-[#f6f9fc] to-blue-50 text-slate-900"><style>{baseCss}</style><div className="flex min-h-screen"><aside className="hidden w-72 shrink-0 border-r border-slate-200 bg-white/90 p-5 backdrop-blur lg:block"><div className="rounded-3xl bg-blue-600 p-5 text-white shadow-xl shadow-blue-600/20"><div className="flex h-12 w-12 items-center justify-center rounded-2xl bg-white/15 text-xl font-black ring-1 ring-white/20">QD</div><p className="mt-4 text-lg font-bold">QueryDesk</p><p className="text-sm text-blue-100">Raise. Link. Resolve.</p></div><nav className="mt-5 space-y-1">{visibleNav.map(([key, label]) => <button key={key} onClick={() => goto(key)} className={cn("flex w-full rounded-2xl px-4 py-3 text-sm font-semibold", page === key && !current ? "bg-blue-50 text-blue-700 shadow-sm" : "text-slate-600 hover:bg-slate-50 hover:text-slate-950")}>{label}</button>)}</nav><div className="mt-8 rounded-3xl bg-blue-50 p-4 text-blue-900 ring-1 ring-blue-100"><p className="font-bold">Logged in as</p><p className="mt-1 text-sm leading-6">{sessionUser.name}<br />{sessionUser.role}</p></div></aside><main className="flex-1"><header className="sticky top-0 z-20 border-b border-slate-200 bg-white/90 px-4 py-4 shadow-sm backdrop-blur lg:px-8"><div className="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between"><select value={page} onChange={e => goto(e.target.value)} className="rounded-xl border px-3 py-2.5 text-sm lg:hidden">{visibleNav.map(([key, label]) => <option key={key} value={key}>{label}</option>)}</select><div><p className="text-sm font-semibold text-slate-500">Welcome back,</p><div className="mt-1 flex flex-wrap items-center gap-2"><p className="text-xl font-bold text-slate-950">{sessionUser.name}</p><Badge t={sessionUser.level === "coordinator" ? "blue" : sessionUser.level === "supervisor" ? "purple" : "slate"}>{sessionUser.role}</Badge></div></div><div className="flex gap-2"><button onClick={() => { setData(seed()); setSelected(null); setNotice("Demo data reset."); }} className="rounded-xl bg-white px-4 py-2.5 text-sm font-bold text-slate-700 ring-1 ring-slate-200">Reset demo</button><button onClick={() => { setSessionUser(null); setSelected(null); setNotice(""); }} className="rounded-xl bg-slate-950 px-4 py-2.5 text-sm font-bold text-white">Logout</button></div></div></header>{notice && <div className="mx-auto mt-4 max-w-7xl px-4 lg:px-8"><div className="rounded-2xl bg-amber-50 p-4 text-sm font-semibold text-amber-900 ring-1 ring-amber-200"><div className="flex items-start justify-between gap-4"><p>{notice}</p><button onClick={() => setNotice("")} className="shrink-0 rounded-lg bg-amber-100 px-2 py-1 text-xs font-bold text-amber-900">Dismiss</button></div></div></div>}<div key={current ? current.id : page} className="mx-auto max-w-7xl p-4 lg:p-8">{content}</div></main></div></div>;
}


ReactDOM.createRoot(document.getElementById("root")).render(<TicketingQueryManagementSystem />);

  </script>
</body>
</html>
